name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 7 * * 1'  # 每周一 UTC 07:23

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
