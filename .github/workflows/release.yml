name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

jobs:
  # ── 先跑测试，通过后再构建 release ──
  test:
    name: Pre-release Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pastel-linux-x86_64
          # aarch64-linux-gnu 交叉编译暂不支持 (Skia 系统依赖复杂)
          # TODO: 使用 cross 或 Docker 方案支持 Linux ARM64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: pastel-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pastel-darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pastel-windows-x86_64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Linux 系统依赖 (Skia 需要 fontconfig/freetype)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Unix 打包
      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="pastel-${VERSION}-${{ matrix.artifact }}.tar.gz"
          tar czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" pastel
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      # Windows 打包
      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $ARCHIVE = "pastel-${VERSION}-${{ matrix.artifact }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/pastel.exe" -DestinationPath $ARCHIVE
          $hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ascii "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            pastel-*.tar.gz
            pastel-*.tar.gz.sha256
            pastel-*.zip
            pastel-*.zip.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/pastel-*.tar.gz
            artifacts/pastel-*.zip
            artifacts/checksums.txt
